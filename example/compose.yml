services:
  claude-code:
    image: dgshue/claude-container:latest
    container_name: claude-code
    restart: unless-stopped
    environment:
      CLAUDE_CONFIG_DIR: /claude
      SSH_USER: ${SSH_USER:-claude}
      SSH_PASSWORD: ${SSH_PASSWORD:?Set SSH_PASSWORD in .env}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./data/workspace:/workspace
      - ./data/claude-config:/claude
      - ./data/home:/home/claude
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "2222:22"

  # Optional: browser-based SSH access via WebSSH2
  # Uncomment the section below to enable web terminal access
  #
  # webssh2:
  #   image: billchurch/webssh2:latest
  #   container_name: webssh2
  #   restart: unless-stopped
  #   ports:
  #     - "8080:2222"
  #   # Connect to claude-code via the default Docker bridge network
  #   # Open http://localhost:8080/ssh/host/claude-code in your browser
